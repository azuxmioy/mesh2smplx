input:
  mode: textured_mesh
  root: data
  frame_id_regex: ".*?(\\d+)$"
  scale_to_meters: 0.001

rendering:
  mode: auto
  background_color: green
  output_dir: data/rendered

keypoints:
  provider: auto
  weights_dir: checkpoints/openpose135
  hf_repo: hohs/openpose135-weights
  enable_hand: true
  enable_face: true
  crop_to_mask: true
  crop_padding_pixels: 30
  crop_aspect_height: 1200
  crop_aspect_width: 900
  max_input_size: 1280

body_model:
  type: smplx
  gender: female
  model_path: body_models
  use_hands: true
  use_face: true
  use_pca: true
  flat_hand_mean: true
  num_betas: 10
  num_expression_coeffs: 10
  num_pca_comps: 12

fitting:
  # Local viewer debugging is usually run with precomputed data/keypoints_3d.npy.
  device: cpu
  output_dir: data
  scan_surface_samples: 2000
  body_vertex_samples: 2000
  max_total_steps: 1600
  tracking: true
  refine_lower_arms: true
  loss_weights:
    pose_obj: 1.0e3
    pose_pr: 1.0
    spine_pose: 50.0
    neck_pose: 50.0
    betas: 1.0
    lhand: 5.0
    rhand: 5.0
    jaw: 1.0
    f_exp: 0.01
    limb: 1.0e4
    icp: 50.0

conversion:
  output_types:
    - smplx
  num_steps: 200
  learning_rate: 0.01
  beta_regularizer: 1.0e-4
  optimize_betas: true
