input:
  mode: textured_mesh
  root: /path/to/my_sequence
  cameras: null
  images: null
  meshes: /path/to/my_sequence/meshes
  textures: /path/to/my_sequence/textures
  mesh_glob: "frame_*.obj"
  texture_glob: "frame_*.png"
  frame_id_regex: ".*?(\\d+)$"
  scale_to_meters: 0.001

virtual_cameras:
  count: 24
  width: 1280
  height: 720
  focal_length: 1100.0
  radius: auto
  elevation_degrees: 10.0
  azimuth_offset_degrees: 0.0
  render_masks: true
  output_dir: outputs/my_sequence/rendered

keypoints:
  provider: precomputed
  path: /path/to/my_sequence/keypoints_2d
  output_dir: outputs/my_sequence/keypoints_2d

body_model:
  type: smplx
  gender: neutral
  model_path: /path/to/body_models
  use_hands: true
  use_face: true
  num_betas: 10
  num_expression_coeffs: 10
  num_pca_comps: 12

fitting:
  device: cuda
  frames: "0"
  fit_mesh_refinement: false
  output_dir: outputs/my_sequence
  keypoint_loss_weight: 1000.0
  mesh_loss_weight: 50.0
  limb_loss_weight: 10000.0

viewer:
  enabled: false
